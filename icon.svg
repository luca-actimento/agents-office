<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Building outline -->
  <rect x="3" y="6" width="18" height="15" rx="1" stroke="currentColor" stroke-width="1.5"/>
  <!-- Roof / top -->
  <path d="M3 9h18" stroke="currentColor" stroke-width="1.5"/>
  <!-- Windows row 1 -->
  <rect x="6" y="11" width="3" height="2" rx="0.5" fill="currentColor"/>
  <rect x="10.5" y="11" width="3" height="2" rx="0.5" fill="currentColor"/>
  <rect x="15" y="11" width="3" height="2" rx="0.5" fill="currentColor"/>
  <!-- Windows row 2 -->
  <rect x="6" y="15" width="3" height="2" rx="0.5" fill="currentColor"/>
  <rect x="15" y="15" width="3" height="2" rx="0.5" fill="currentColor"/>
  <!-- Door -->
  <rect x="10" y="15" width="4" height="6" rx="0.5" fill="currentColor"/>
  <!-- Flag / antenna -->
  <line x1="12" y1="6" x2="12" y2="3" stroke="currentColor" stroke-width="1.5"/>
  <polygon points="12,3 16,4.5 12,6" fill="currentColor"/>
</svg>
